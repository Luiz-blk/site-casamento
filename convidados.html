<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convidados</title>
    <link rel="stylesheet" href="convidados.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <div id="menu-container"></div>

        <h1>Confirmação de Presença</h1>
    </header>

    <section class="container">
        <h2>Confirme sua presença 💌</h2>

        <input type="text" id="nomeConvidado" placeholder="Digite seu nome">

        <button onclick="confirmarPresenca()">
            Confirmar
        </button>

    </section>

    <section class="lista">

        <h2>Lista de Confirmados</h2>

        <ul id="listaConvidados">
            <template id="templateConvidado">
                <li id="li">
                    <span class="nome"></span>
                    <button class="remover">❌</button>
                </li>
            </template>
        </ul>

    </section>

    <script src="convidados.js"></script>
    <script src="menu.js"></script>
</body>
</html>
